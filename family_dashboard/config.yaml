name: "Family Dashboard"
description: >
  A beautiful family hub — shared calendar, weekly meal planner, recipe book,
  and smart grocery list — all powered by your Home Assistant data.
version: "1.10.15"
slug: "family_dashboard"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: "mdi:view-dashboard"
panel_title: "Family Dashboard"
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Family Dashboard web interface"
options:
  dashboard_password: ""
schema:
  dashboard_password: str
map:
  - share:rw
